<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Contato</title>
</head>
<body>
    <h3>Formulário Básico</h3>
    <form method="get" action="contato.html">
        <label>Nome</label>
        <input type="text" name="nome" placeholder="Digite seu nome..."  />
        <input type="submit" value="Enviar" /> <!-- Botão de Envio -->
    </form>

    <hr />
    <h3>Formulário de Cadastro</h3>
    <fieldset method="get" action="#">
        <fieldset>
            <legend>Dados Pessoais</legend>

            <label for="nomeCompleto">Nome Completo</label>
            <input type="text" name="nomeCompleto" placeholder="Digite seu nome completo" />
            <br />

            <label for="email">E-mail</label>
            <input type="email" name="email" placeholder="Digite seu E-mail..." />
            <br />

            <label for="cpf">CPF</label>
            <input type="number" name="cpf" placeholder="Digite seu CPF..." />
            <br />

        </fieldset>

    </fieldset>
        <legend>Outras informações</legend>

        <label for="DataNascimento">Data do Nascimento</label>
        <input type="Date" name="DataNascimento" />
       <br />
          <label for="DataCadastro">Data de Cadastro</label>
        <input type="Datetime-local" name="DataCadastro" />
       <br />
         <input type="CheckBox" name="EscolaSesi" />
         <label for="escolasesi">SESI</label>
          <input type="CheckBox" name="EscolaSenai" />
          <label for="CheckBox">SENAI</label>
          <input type="CheckBox" name="Escola" />
          <label for="CheckBox">NENHUMA </label>
       <br />

         <input type="radio" nome="sexo">
         <label for="sexo">masculino</label>
         <input type="radio" nome="sexo">
         <label for="sexo">feminino</label>
          <input type="radio" nome="sexo">
         <label for="sexo">Prefiro não Informar</label>
       <br />

       <label for="Curso">Escolha seu Curso</label>
       <select>
           <option value="0">HTML</option>
           <option value="1">CSS</option>
           <option value="2">JavaScript</option>
       </select>

  <br />


   <label for="Comentarios">Comentários</label>
   <textarea name="Comentarios" placeholder="Digite seu comentário..." rows="10" cols="100" ></textarea>


<fieldset>
    
</fieldset>





        <button type="submit">Enviar Dados</button>
        <button type="reset">Limpar o Fomulário</button>
    </form>

</body>
</html>
